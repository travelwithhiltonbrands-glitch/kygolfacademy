<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KYGolfAcademy | Golf Lessons</title>

  <style>
    :root{
      --green:#2f4f3f;
      --green-dark:#20372c;
      --cream:#f7f3ea;
      --soft:#eee9dc;
      --text:#1f1f1f;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background:var(--green);
      color:var(--text);
      line-height:1.65;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* HEADER */
    .site-header{
      position:sticky;
      top:0;
      z-index:20;
      background:var(--green);
      border-bottom:1px solid rgba(255,255,255,.15);
    }

    .header-inner{
      max-width:1200px;
      margin:auto;
      padding:18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .brand{
      color:var(--cream);
      font-size:14px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      font-weight:600;
      white-space:nowrap;
    }

    .main-nav{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .main-nav a{
      color:var(--cream);
      text-decoration:none;
      font-size:14px;
    }

    .main-nav a:hover{
      opacity:.75;
    }

    /* HERO */
    .hero{
      min-height:72vh;
      display:grid;
      grid-template-columns:1fr 1fr;
      background:var(--green);
    }

    .hero-copy{
      padding:80px 64px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      color:var(--cream);
    }

    .hero-copy-inner{
      max-width:620px;
      margin-left:auto;
    }

    .hero-kicker{
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:13px;
      opacity:.78;
      margin-bottom:18px;
    }

    h1{
      font-size:clamp(42px,7vw,76px);
      line-height:1.05;
      letter-spacing:-1.8px;
      font-weight:500;
      margin:0 0 22px;
    }

    .hero-copy p{
      font-size:20px;
      max-width:540px;
      margin:0;
      opacity:.9;
    }

    .btn{
      display:inline-block;
      margin-top:22px;
      padding:12px 18px;
      border-radius:999px;
      background:var(--cream);
      color:var(--green);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
    }

    .btn:hover{
      opacity:.9;
    }

    .hero-video-wrap{
      height:72vh;
      overflow:hidden;
      background:var(--green);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* ✅ FIXED VIDEO (NO ZOOM) */
    .hero-video-wrap video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:var(--green);
      display:block;
    }

    section{
      padding:86px 24px;
    }

    h2{
      color:var(--green);
      margin:0 0 18px;
      font-size:36px;
      line-height:1.15;
      font-weight:500;
    }

    /* ABOUT */
    #about{
      background:var(--cream);
    }

    .about-layout{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:260px 1fr;
      gap:44px;
      align-items:start;
    }

    .about-photo img{
      width:100%;
      height:380px;
      object-fit:cover;
      border-radius:16px;
      box-shadow:0 18px 55px rgba(31,53,42,.16);
    }

    .about-text p{
      margin:0 0 16px;
      color:#444;
      line-height:1.7;
    }

    /* LESSONS */
    #lessons{
      background:var(--soft);
    }

    .lessons-inner{
      max-width:1200px;
      margin:auto;
    }

    .lessons-intro{
      font-size:clamp(30px,4vw,44px);
      margin-bottom:40px;
      color:var(--green);
    }

    .lessons-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .lesson-col{
      background:white;
      padding:26px;
      border-radius:16px;
    }

    /* PRICING */
    #pricing{
      background:var(--cream);
    }

    .pricing-inner{
      max-width:1200px;
      margin:auto;
    }

    .pricing-note{
      color:#555;
      max-width:740px;
      margin:0 0 34px;
    }

    .pricing-note a{
      color:var(--green);
      text-decoration:underline;
      text-underline-offset:3px;
    }

    .pricing-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    .price-card{
      background:white;
      padding:26px;
      border-radius:16px;
    }

    /* LOCATION */
    #location{
      background:var(--soft);
    }

    .location-map iframe{
      width:100%;
      height:340px;
      border:0;
      border-radius:16px;
    }

    /* CONTACT */
    #contact{
      background:var(--green);
      color:var(--cream);
    }

    footer{
      text-align:center;
      padding:24px;
      color:rgba(255,255,255,.7);
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="hero-copy">
    <div class="hero-copy-inner">
      <div class="hero-kicker">English & Korean Instruction</div>
      <h1>Simple coaching for better golf.</h1>

      <p>
        Private golf instruction in Alexandria, Virginia focused on efficient swing improvement,
        smarter practice, and lasting confidence.
      </p>

      <a class="btn" href="#contact">Book a Lesson</a>
    </div>
  </div>

  <div class="hero-video-wrap">
    <video autoplay muted loop playsinline preload="auto">
      <source src="./swing.mp4?v=70" type="video/mp4" />
    </video>
  </div>
</section>

</body>
</html>
