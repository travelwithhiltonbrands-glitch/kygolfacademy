<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KYGolfAcademy | Golf Lessons</title>

  <style>
    :root{
      --green:#2f4f3f;
      --green-dark:#20372c;
      --cream:#f7f3ea;
      --soft:#eee9dc;
      --text:#1f1f1f;
    }

    *{ box-sizing:border-box; }

    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background:var(--green);
      color:var(--text);
      line-height:1.65;
    }

    img{ max-width:100%; display:block; }

    .site-header{
      position:sticky;
      top:0;
      z-index:20;
      background:var(--green);
      border-bottom:1px solid rgba(255,255,255,.15);
    }

    .header-inner{
      max-width:1200px;
      margin:auto;
      padding:18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .brand{
      color:var(--cream);
      font-size:14px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      font-weight:600;
    }

    .main-nav{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
    }

    .main-nav a{
      color:var(--cream);
      text-decoration:none;
      font-size:14px;
    }

    .hero{
      min-height:72vh;
      display:grid;
      grid-template-columns:1fr 1fr;
    }

    .hero-copy{
      padding:80px 64px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      color:var(--cream);
    }

    .hero-copy-inner{
      max-width:620px;
      margin-left:auto;
    }

    h1{
      font-size:clamp(42px,7vw,76px);
      margin:0 0 22px;
    }

    .btn{
      display:inline-block;
      margin-top:22px;
      padding:12px 18px;
      border-radius:999px;
      background:var(--cream);
      color:var(--green);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
    }

    section{ padding:86px 24px; }

    h2{
      color:var(--green);
      margin-bottom:18px;
      font-size:36px;
    }

    #about{ background:var(--cream); }
    #lessons{ background:var(--soft); }
    #pricing{ background:var(--cream); }
    #location{ background:var(--soft); }
    #contact{ background:var(--green); color:var(--cream); }

    footer{
      text-align:center;
      padding:24px;
      color:rgba(255,255,255,.7);
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">KY Golf Academy</div>
    <nav class="main-nav">
      <a href="#about">About</a>
      <a href="#lessons">Lessons</a>
      <a href="#pricing">Pricing</a>
      <a href="#location">Location</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero-copy">
    <div class="hero-copy-inner">
      <h1>Simple coaching for better golf.</h1>
      <p>Private golf instruction in Alexandria, Virginia.</p>

      <!-- UPDATED -->
      <a class="btn" href="booking.html">Book a Lesson</a>
    </div>
  </div>
</section>

<section id="about">
  <h2>About</h2>

  <!-- UPDATED -->
  <a class="btn" href="booking.html">Book a Lesson</a>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: <a href="mailto:kygolfacademy@gmail.com">kygolfacademy@gmail.com</a></p>
</section>

<footer>
  © 2026 KY Golf Academy
</footer>

</body>
</html>
